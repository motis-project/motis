<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><title>Shortbread · VersaTiles Colorful · self-hosted by MOTIS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>html,body,#map{margin:0;height:100%}
#info{position:absolute;top:10px;left:10px;z-index:1;background:rgba(255,255,255,.9);
padding:6px 10px;border-radius:6px;font:12px system-ui,sans-serif;box-shadow:0 1px 4px rgba(0,0,0,.2)}</style>
</head><body>
<div id="map"></div>
<div id="info">VersaTiles Colorful — tiles + glyphs + sprites all self-hosted by MOTIS (no CDN)</div>
<script>
// The style (colorful.json) uses origin-relative URLs so it stays portable.
// MapLibre fetches vector tiles inside a Web Worker, which has no base URL, so
// tile URLs must be absolute. Resolve all asset URLs against this origin here.
const origin = location.origin;
const abs = u => (typeof u === "string" && u.startsWith("/")) ? origin + u : u;
(async () => {
  const style = await (await fetch(origin + "/colorful.json")).json();
  for (const s of Object.values(style.sources || {})) {
    if (Array.isArray(s.tiles)) s.tiles = s.tiles.map(abs);
    if (s.url) s.url = abs(s.url);
  }
  style.glyphs = abs(style.glyphs);
  if (Array.isArray(style.sprite)) style.sprite = style.sprite.map(sp => ({ ...sp, url: abs(sp.url) }));
  else style.sprite = abs(style.sprite);

  window.map = new maplibregl.Map({ container: "map", style, center: [6.0839, 50.7753], zoom: 14 });
  map.addControl(new maplibregl.NavigationControl());
  map.on("error", e => { window.__err = (e && e.error && e.error.message) || "err"; console.warn("maplibre:", window.__err); });
})();
</script>
</body></html>
